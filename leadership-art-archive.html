<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الكبسولات - فن القيادة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: #020617;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            min-height: 100vh;
            flex-wrap: wrap;
        }

        .phone-container {
            width: 375px;
            height: 780px;
            border-radius: 48px;
            overflow: hidden; 
            position: relative;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            border: 8px solid #1e293b;
        }

        .light-mode { background: #fdfdfd; color: #0f172a; }
        .light-mode .card { background: #ffffff; border: 1px solid rgba(0, 0, 0, 0.05); }
        .light-mode .filter-btn { background: #f1f5f9; color: #64748b; }
        .light-mode .filter-btn.active { background: #1e3a8a; color: white; }
        .light-mode .bottom-nav { background: #ffffff; border-top: 1px solid #f1f5f9; }

        .dark-mode { background: #0f172a; color: white; }
        .dark-mode .card { background: #1e293b; border: 1px solid rgba(255, 255, 255, 0.05); }
        .dark-mode .filter-btn { background: #1e293b; color: #94a3b8; }
        .dark-mode .filter-btn.active { background: #3b82f6; color: white; }
        .dark-mode .bottom-nav { background: #0f172a; border-top: 1px solid rgba(255, 255, 255, 0.05); }

        .card { cursor: pointer; transition: all 0.2s ease; border-radius: 20px; }
        .card:active { transform: scale(0.97); }

        .action-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .light-mode .action-icon { background: #f1f5f9; color: #1e3a8a; }
        .dark-mode .action-icon { background: #0f172a; color: #3b82f6; }

        .filter-btn { 
            padding: 10px 24px; 
            border-radius: 14px; 
            font-size: 13px; 
            font-weight: 800; 
            transition: all 0.2s;
            flex: 1;
        }

        .bottom-nav {
            height: 85px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px 15px;
            z-index: 50;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.4;
        }

        .nav-item.active { opacity: 1; }
        .nav-item i { font-size: 18px; }
        .nav-item span { font-size: 10px; font-weight: 800; }

        .light-mode .nav-item.active { color: #1e3a8a; }
        .dark-mode .nav-item.active { color: #3b82f6; }

        .modal-view {
            position: absolute; inset: 0; z-index: 100;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex; flex-direction: column;
        }
        .modal-view.active { transform: translateY(0); }

        .reading-mode { padding: 20px 24px; overflow-y: auto; height: 100%; display: flex; flex-direction: column; }
        .reading-title { font-size: 24px; font-weight: 800; line-height: 1.4; margin-bottom: 16px; }
        .reading-content { font-size: 16px; line-height: 1.8; text-align: justify; opacity: 0.9; margin-bottom: 120px; }

        .audio-trigger-bar {
            position: absolute;
            bottom: 30px;
            left: 24px;
            right: 24px;
            height: 70px;
            background: rgba(30, 58, 138, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 110;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .play-button-glow {
            width: 48px;
            height: 48px;
            background: #3b82f6;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .audio-overlay {
            position: absolute; inset: 0; z-index: 120;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            padding: 40px 24px;
            display: flex; flex-direction: column;
        }
        .audio-overlay.active { transform: translateY(0); }

        .home-indicator {
            position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 120px; height: 5px; background: rgba(128,128,128,0.2); border-radius: 10px;
        }

        .wave-dot {
            width: 3px; background: white; border-radius: 2px;
            animation: wave 1s infinite alternate;
        }
        @keyframes wave { from { height: 4px; } to { height: 16px; } }
    </style>
</head>
<body>

    <!-- نسخة الوضع الفاتح -->
    <div class="phone-container light-mode">
        <div class="px-8 py-3 flex justify-between items-center text-[11px] font-bold text-slate-400">
            <span>٩:٤١</span>
            <div class="flex gap-2"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div>
        </div>
        <header class="px-6 py-4">
            <h1 class="text-2xl font-black">أفكار فن القيادة</h1>
        </header>
        
        <div class="px-6 mb-4">
            <div class="flex gap-2">
                <button class="filter-btn active" onclick="setFilter('all', 'light')">الكل</button>
                <button class="filter-btn" onclick="setFilter('fav', 'light')">المفضلة</button>
            </div>
        </div>

        <main class="flex-grow px-6 py-2 overflow-y-auto space-y-4" id="list-light"></main>
        
        <div id="modal-light" class="modal-view light-mode">
            <div class="flex items-center justify-between px-6 pt-6 mb-2 relative z-[101]">
                <button onclick="closeModal('light')" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center"><i class="fas fa-chevron-down text-slate-500"></i></button>
                <div class="flex gap-4">
                    <i class="far fa-bookmark text-slate-400"></i>
                </div>
            </div>
            <div id="modal-body-light" class="flex-grow overflow-hidden relative"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="nav-item"><i class="fas fa-layer-group"></i><span>الأقسام</span></div>
            <div class="nav-item"><i class="fas fa-headphones-alt"></i><span>بودكاست</span></div>
            <div class="nav-item"><i class="fas fa-search"></i><span>بحث</span></div>
            <div class="nav-item"><i class="fas fa-cog"></i><span>إعدادات</span></div>
        </nav>
        <div class="home-indicator"></div>
    </div>

    <!-- نسخة الوضع الداكن -->
    <div class="phone-container dark-mode">
        <div class="px-8 py-3 flex justify-between items-center text-[11px] font-bold text-slate-600">
            <span>٩:٤١</span>
            <div class="flex gap-2"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div>
        </div>
        <header class="px-6 py-4">
            <h1 class="text-2xl font-black text-white">أفكار فن القيادة</h1>
        </header>

        <main class="flex-grow px-6 py-2 overflow-y-auto space-y-4" id="list-dark"></main>
        
        <div id="modal-dark" class="modal-view dark-mode">
            <div class="flex items-center justify-between px-6 pt-6 mb-2 relative z-[101]">
                <button onclick="closeModal('dark')" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center"><i class="fas fa-chevron-down text-white/50"></i></button>
                <div class="flex gap-4">
                    <i class="far fa-bookmark text-white/30"></i>
                </div>
            </div>
            <div id="modal-body-dark" class="flex-grow overflow-hidden relative"></div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="nav-item"><i class="fas fa-layer-group"></i><span>الأقسام</span></div>
            <div class="nav-item"><i class="fas fa-headphones-alt"></i><span>بودكاست</span></div>
            <div class="nav-item"><i class="fas fa-search"></i><span>بحث</span></div>
            <div class="nav-item"><i class="fas fa-cog"></i><span>إعدادات</span></div>
        </nav>
        <div class="home-indicator"></div>
    </div>

    <script>
        const capsules = [
            {
                id: 1,
                title: 'حوكمة الذكاء الاصطناعي: الدليل الكامل لمجالس الإدارة',
                day: 'اليوم 3',
                isFav: false,
                content: `تعد حوكمة الذكاء الاصطناعي اليوم الركيزة الأساسية لضمان استدامة الابتكار في الشركات الكبرى، حيث يتطلب هذا المسار الاستراتيجي فهماً عميقاً للمخاطر الأخلاقية والتقنية المعقدة، مع ضرورة وضع أطر عمل مؤسسية تضمن الشفافية التامة والمساءلة القانونية.`
            },
            {
                id: 2,
                title: 'سيكولوجية التفاوض في الأزمات الاستراتيجية',
                day: 'اليوم 2',
                isFav: true,
                content: `إن التفاوض في الأزمات الاستراتيجية ليس مجرد تبادل للكلمات، بل هو رقصة دقيقة تتطلب ثباتاً انفعالياً هائلاً وقدرة على قراءة المتغيرات غير المرئية لتحويل الضغوط إلى فرص نمو مستدامة تعزز من قيمة الشركة.`
            },
            {
                id: 3,
                title: 'القيادة الرؤوفة: التوازن بين الحزم والتعاطف',
                day: 'اليوم 1',
                isFav: false,
                content: 'توضح أحدث الدراسات أن القادة الذين يدمجون التعاطف الإنساني مع الحزم المهني يحققون مستويات إنتاجية تفوق نظراءهم، حيث يخلق هذا التوازن بيئة عمل قائمة على الثقة المتبادلة والابتكار.'
            }
        ];

        let currentFilter = 'all';

        function setFilter(type, mode) {
            currentFilter = type;
            const btns = document.querySelectorAll(`.${mode}-mode .filter-btn`);
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderLists();
        }

        function renderLists() {
            ['light', 'dark'].forEach(mode => {
                const container = document.getElementById(`list-${mode}`);
                const filtered = currentFilter === 'all' ? capsules : capsules.filter(c => c.isFav);
                container.innerHTML = filtered.map(cap => `
                    <div class="card p-5 flex items-center gap-4 shadow-sm" onclick="openCapsule(${cap.id}, '${mode}')">
                        <div class="action-icon"><i class="fas fa-file-alt text-sm"></i></div>
                        <div class="flex-grow">
                            <h3 class="text-[14px] font-bold leading-tight mb-1">${cap.title}</h3>
                            <div class="flex items-center gap-1 opacity-40"><i class="far fa-calendar-check text-[9px]"></i><span class="text-[10px] font-bold">${cap.day}</span></div>
                        </div>
                        ${cap.isFav ? '<i class="fas fa-bookmark text-blue-500 text-[10px]"></i>' : '<i class="fas fa-chevron-left opacity-20 text-[10px]"></i>'}
                    </div>
                `).join('');
            });
        }

        function openCapsule(id, mode) {
            const cap = capsules.find(c => c.id === id);
            const body = document.getElementById(`modal-body-${mode}`);
            const isDarkMode = mode === 'dark';
            
            body.innerHTML = `
                <div id="audio-overlay-${mode}" class="audio-overlay ${isDarkMode ? 'dark-mode' : 'light-mode'}">
                    <div class="flex justify-between items-center mb-10">
                        <button onclick="toggleAudio('${mode}')" class="w-10 h-10 rounded-full ${isDarkMode ? 'bg-white/10' : 'bg-slate-100'} flex items-center justify-center"><i class="fas fa-times"></i></button>
                        <span class="text-xs font-black opacity-50 uppercase tracking-widest">المشغل الصوتي</span>
                    </div>
                    <div class="flex-grow flex flex-col items-center justify-center text-center">
                        <div class="w-48 h-48 rounded-3xl bg-gradient-to-br from-blue-600 to-indigo-900 shadow-2xl flex items-center justify-center mb-10"><i class="fas fa-volume-up text-white/30 text-6xl"></i></div>
                        <h3 class="text-xl font-black mb-2 px-6">${cap.title}</h3>
                        <p class="text-blue-500 font-bold text-sm mb-12">كبسولة صوتية - ${cap.day}</p>
                        <div class="w-full h-1.5 ${isDarkMode ? 'bg-gray-500/10' : 'bg-slate-200'} rounded-full mb-8 relative"><div class="absolute inset-y-0 right-0 w-1/3 bg-blue-500 rounded-full"></div></div>
                        <div class="flex items-center gap-8">
                            <i class="fas fa-backward text-2xl opacity-40"></i>
                            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-xl shadow-blue-600/40"><i class="fas fa-play text-2xl text-white ml-1"></i></div>
                            <i class="fas fa-forward text-2xl opacity-40"></i>
                        </div>
                    </div>
                </div>

                <div class="reading-mode">
                    <h2 class="reading-title">${cap.title}</h2>
                    <p class="text-blue-600 text-xs font-bold mb-6 tracking-wide">${cap.day}</p>
                    <div class="reading-content">${cap.content}</div>
                    <div class="audio-trigger-bar" onclick="toggleAudio('${mode}')">
                        <div class="flex items-center gap-4">
                            <div class="play-button-glow"><i class="fas fa-play text-sm ml-1"></i></div>
                            <span class="text-[16px] font-black tracking-tight">اسمع الآن</span>
                        </div>
                        <div class="flex gap-1 items-end h-4">
                            <div class="wave-dot" style="animation-delay: 0.1s"></div>
                            <div class="wave-dot" style="animation-delay: 0.3s"></div>
                            <div class="wave-dot" style="animation-delay: 0.2s"></div>
                            <div class="wave-dot" style="animation-delay: 0.4s"></div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById(`modal-${mode}`).classList.add('active');
        }

        function toggleAudio(mode) { document.getElementById(`audio-overlay-${mode}`).classList.toggle('active'); }
        function closeModal(mode) { document.getElementById(`modal-${mode}`).classList.remove('active'); }
        window.onload = renderLists;
    </script>
</body>
</html>
