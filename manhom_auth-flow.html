<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة من هم — الفلو الكامل</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#FDFDFD;direction:rtl;color:#1e293b}
button{font-family:inherit;cursor:pointer}
a{text-decoration:none;color:inherit}

/* ── Layout ── */
.page{min-height:100vh;display:flex;flex-direction:column}
.container{max-width:1100px;margin:0 auto;padding:0 20px;width:100%}
.container-lg{max-width:1280px;margin:0 auto;padding:0 20px;width:100%}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;font-family:inherit;cursor:pointer;font-weight:700;transition:all .2s}
.btn-primary{background:#0570de;color:white;border-radius:10px;padding:15px 24px;font-size:15px;width:100%}
.btn-primary:hover{background:#0461c8}
.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}
.btn-ghost{background:transparent;color:#6b7280;border:1px solid #e2e8f0;border-radius:10px;padding:13px 24px;font-size:14px;width:100%;margin-top:8px}
.btn-blue{background:#2563eb;color:white;border-radius:100px;padding:10px 28px;font-size:14px}
.btn-blue:hover{background:#1d4ed8}
.btn-dark{background:#1e293b;color:white;border-radius:100px;padding:9px 20px;font-size:13px}

/* ── Cards ── */
.card{background:white;border:1px solid #f1f5f9;border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,.02)}

/* ── Header ── */
.site-header{background:#96E3FF;border-bottom:1px solid rgba(0,0,0,.05);position:sticky;top:0;z-index:50}
.header-inner{max-width:1280px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;height:72px;gap:8px}
.logo{font-size:22px;font-weight:900;color:#1e293b;background:none;border:none;padding:0}
.logo em{color:#4169E1;font-style:normal}
.nav-btn{background:none;border:none;font-size:15px;font-weight:500;color:#4F4F4F;padding:7px 10px;border-radius:6px;transition:color .15s,background .15s;white-space:nowrap}
.nav-btn:hover{color:#4169E1;background:rgba(0,0,0,0.05)}

/* ── Dropdown ── */
.dropdown{position:relative}
.dd-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:white;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.14);border:1px solid #e2e8f0;min-width:210px;z-index:300;overflow:hidden}
.dd-menu.open{display:block}
.dd-item{display:flex;align-items:center;gap:6px;width:100%;padding:12px 18px;font-size:14px;color:#1e293b;font-weight:500;background:transparent;border:none;font-family:inherit;text-align:right}
.dd-item:hover{background:#f0f9ff;cursor:pointer}

/* ── Person card ── */
.person-card{cursor:pointer;background:white;border-radius:12px;overflow:hidden;border:1px solid #f1f5f9;transition:box-shadow .2s,transform .2s}
.person-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.10);transform:translateY(-2px)}
.person-card img{width:100%;aspect-ratio:306/353;object-fit:cover;object-position:top;display:block}
.person-card .pc-info{padding:10px 10px 12px;text-align:center}
.person-card h3{font-size:13px;font-weight:700;color:#20211F;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;line-height:1.4}
.person-card p{font-size:11.5px;color:#4F4F4F;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* ── Chips ── */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:100px;font-weight:600}
.chip-blue{background:#eff6ff;color:#2563eb}
.chip-green{background:#f0fdf4;color:#166534}
.chip-gray{background:#f1f5f9;color:#475569}
.chip-amber{background:#fffbeb;color:#b45309;border:1px solid #fde68a}

/* ── VIP card ── */
.vip-ceo{background:linear-gradient(180deg,#FEF6D8 0%,#F6EDCA 79%,#E0D29E 100%);border-radius:10px;border:1px solid #E0D29E;padding:12px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:box-shadow .2s,transform .2s;margin-bottom:8px}
.vip-ceo:hover{box-shadow:0 4px 16px rgba(0,0,0,.10);transform:translateY(-1px)}

/* ── Day badge ── */
.day-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;width:50px;height:50px;border-radius:12px;flex-shrink:0}
.day-badge .nb{font-size:18px;font-weight:800;line-height:1}
.day-badge .mb{font-size:9px;margin-top:2px;font-weight:600}
.day-badge.db-blue{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe}.day-badge.db-blue .nb{color:#1d4ed8}.day-badge.db-blue .mb{color:#2563eb}
.day-badge.db-green{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #86efac}.day-badge.db-green .nb,.day-badge.db-green .mb{color:#15803d}
.day-badge.db-amber{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d}.day-badge.db-amber .nb,.day-badge.db-amber .mb{color:#b45309}
.day-badge.db-red{background:linear-gradient(135deg,#fef2f2,#fecaca);border:1px solid #fca5a5}.day-badge.db-red .nb,.day-badge.db-red .mb{color:#b91c1c}

/* ── Pay inputs ── */
.pay-input{width:100%;height:48px;padding:0 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;box-sizing:border-box}
.pay-input:focus{border-color:#0570de}

/* ── KYC progress ── */
.kyc-progress-bar{height:3px;background:#e5e7eb}
.kyc-progress-fill{height:100%;background:#0570de;transition:width .4s ease}

/* ── Footer ── */
.site-footer{background:#f8fafc;border-top:1px solid #e2e8f0;margin-top:48px}
.footer-grid{max-width:1280px;margin:0 auto;padding:48px 20px 0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:40px;margin-bottom:40px}
.footer-bottom{border-top:1px solid #e2e8f0;padding:16px 20px;text-align:center;font-size:14px;color:#94a3b8}
.footer-col a{display:block;padding:5px 0;font-size:14px;color:#64748b}

@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(34,197,94,.18)}50%{box-shadow:0 0 0 7px rgba(34,197,94,.06)}}
</style>
</head>

function sVerify(){
  const stepNum={why:1,docType:2,scanDoc:3,selfie:4,done:4};
  const cur=stepNum[S.verifyStep]||1, total=4;
  const pct=(cur/total)*100;

  const wrap = (html) => `
  <div style="min-height:100vh;background:#f4f6f9;font-family:'IBM Plex Sans Arabic',sans-serif">
    <div style="background:white;border-bottom:1px solid #e5e7eb;padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between">

      <div style="display:flex;align-items:center;gap:8px">
        ${Array.from({length:total},(_,i)=>`<div style="width:${i<cur?28:8}px;height:8px;border-radius:100px;background:${i<cur?'#0570de':'#e2e8f0'};transition:all .3s"></div>`).join('')}
        <span style="font-size:12px;color:#9ca3af;margin-right:4px">${cur} / ${total}</span>
      </div>
      <button onclick="go('membership')" style="font-size:13px;color:#6b7280;background:none;border:none;cursor:pointer;font-family:inherit">✕ إلغاء</button>

    <div class="kyc-progress-bar"><div class="kyc-progress-fill" style="width:${pct}%"></div></div>
    <div style="max-width:560px;margin:0 auto;padding:40px 20px 60px">${html}</div>
  </div>`;

  const card = (h) => `<div style="background:white;border-radius:16px;padding:32px 28px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e5e7eb">${h}</div>`;

  // WHY
  if(S.verifyStep==='why') return wrap(card(`
    <!-- Payment confirmed banner -->
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px 16px;margin-bottom:24px">
      <span style="font-size:18px">✅</span>

    </div>

      <div style="width:72px;height:72px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:36px">🛡️</div>
      <h2 style="font-size:22px;font-weight:900;margin-bottom:10px">التحقق من الهوية</h2>
      <p style="font-size:14px;color:#6b7280;line-height:1.8">للامتثال للوائح FCA ومتطلبات KYC نحتاج تأكيد هويتك لتفعيل عضويتك الموثقة.</p>
    </div>
    <div style="background:#f8fafc;border-radius:12px;padding:20px;margin-bottom:24px">
      <p style="font-size:13px;font-weight:700;color:#374151;margin-bottom:12px">لماذا نطلب هذا؟</p>
      ${[['🔒','ضمان أن الملف الموثق يعود لشخص حقيقي'],['🏦','متطلبات Stripe للاشتراكات المتكررة في UK'],['⚖️','الامتثال لقانون مكافحة غسيل الأموال AMLD6'],['🛡️','حماية هويتك من الانتحال']].map((r,i)=>`
      <div style="display:flex;gap:10px;padding:7px 0;border-bottom:${i<3?'1px solid #f1f5f9':'none'}"><span style="font-size:16px;flex-shrink:0">${r[0]}</span><span style="font-size:13px;color:#4b5563;line-height:1.6">${r[1]}</span></div>`).join('')}
    </div>
    <div style="display:flex;gap:10px;padding:12px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;margin-bottom:16px">

    </div>
    <div style="display:flex;gap:10px;padding:12px 14px;background:#fafafa;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:20px">

    ${pb('ابدأ التحقق الآن',"S.verifyStep='docType';draw()")}

  `));

  // DOC TYPE
  if(S.verifyStep==='docType'){
    const docs=[{id:'passport',l:'جواز سفر',d:'مقبول من جميع الدول',i:'🛂'},{id:'national_id',l:'بطاقة هوية وطنية',d:'للمقيمين في دول تصدرها',i:'🪪'},{id:'driving_licence',l:'رخصة قيادة بريطانية',d:'DVLA UK فقط',i:'🚗'},{id:'brp',l:'Biometric Residence Permit',d:'للمقيمين في المملكة المتحدة',i:'📋'}];

            ${S.verifyDoc===d.id?'<div style="width:8px;height:8px;border-radius:50%;background:white"></div>':''}

        </label>`).join('')}
      </div>
      <p style="font-size:13px;font-weight:700;color:#374151;margin-bottom:10px">طريقة الرفع</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px">
        ${[{id:'camera',l:'كاميرا الجهاز',i:'📷'},{id:'upload',l:'رفع ملف PDF/صورة',i:'📁'}].map(m=>`
        <button onclick="S.verifyMode='${m.id}';draw()" style="padding:12px;border-radius:10px;border:2px solid ${S.verifyMode===m.id?'#0570de':'#e2e8f0'};background:${S.verifyMode===m.id?'#eff6ff':'white'};cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:${S.verifyMode===m.id?'#0570de':'#374151'};display:flex;flex-direction:column;align-items:center;gap:6px">
          <span style="font-size:22px">${m.i}</span>${m.l}
        </button>`).join('')}
      </div>
      ${pb('متابعة',"S.verifyStep='scanDoc';draw()")}
      ${gb('رجوع',"S.verifyStep='why';draw()")}
    `));
  }

  // SCAN DOC
  if(S.verifyStep==='scanDoc') return wrap(card(`
    <div style="font-size:12px;color:#0570de;font-weight:700;margin-bottom:6px">● الخطوة 1 من 2 — مسح الوثيقة</div>
    <h2 style="font-size:20px;font-weight:900;margin-bottom:6px">صوّر وثيقتك الرسمية</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.7">تأكد من وضوح الصورة وإضاءة جيدة وعدم وجود انعكاس.</p>
    ${S.verifyMode==='camera'?`
    <div style="background:#111827;border-radius:14px;overflow:hidden;margin-bottom:20px">
      <div style="aspect-ratio:4/3;position:relative;display:flex;align-items:center;justify-content:center">
        <div style="position:absolute;top:12px;right:12px;width:28px;height:28px;border-top:3px solid #00d66f;border-right:3px solid #00d66f"></div>
        <div style="position:absolute;top:12px;left:12px;width:28px;height:28px;border-top:3px solid #00d66f;border-left:3px solid #00d66f"></div>
        <div style="position:absolute;bottom:12px;right:12px;width:28px;height:28px;border-bottom:3px solid #00d66f;border-right:3px solid #00d66f"></div>
        <div style="position:absolute;bottom:12px;left:12px;width:28px;height:28px;border-bottom:3px solid #00d66f;border-left:3px solid #00d66f"></div>
        <div style="text-align:center"><div style="font-size:36px;margin-bottom:10px">📄</div><p style="color:rgba(255,255,255,.5);font-size:13px">ضع الوثيقة داخل الإطار</p></div>
      </div>
      <div style="background:rgba(0,0,0,.6);padding:10px 16px;display:flex;gap:16px;justify-content:center">
        ${['إضاءة جيدة','لا انعكاس','البيانات ظاهرة'].map(t=>`<span style="font-size:11px;color:#00d66f;font-weight:600">✓ ${t}</span>`).join('')}
      </div>
    </div>`:`
    <div style="border:2px dashed #bfdbfe;border-radius:14px;padding:40px 20px;text-align:center;margin-bottom:20px;background:#f8fafc;cursor:pointer">
      <div style="font-size:40px;margin-bottom:12px">📁</div>
      <p style="font-size:14px;font-weight:700;margin-bottom:6px">اسحب الملف هنا أو اضغط للاختيار</p>
      <p style="font-size:12px;color:#9ca3af">PDF, JPG, PNG — الحجم الأقصى 10MB</p>
    </div>`}
    ${pb('التقطت الصورة — متابعة',"S.verifyStep='selfie';draw()")}
    ${gb('رجوع',"S.verifyStep='docType';draw()")}
  `));

  // SELFIE
  if(S.verifyStep==='selfie') return wrap(card(`
    <div style="font-size:12px;color:#0570de;font-weight:700;margin-bottom:6px">● الخطوة 2 من 2 — Liveness Check</div>
    <h2 style="font-size:20px;font-weight:900;margin-bottom:6px">صورة حية للتحقق</h2>
    <p style="font-size:13px;color:#6b7280;margin-bottom:16px;line-height:1.7">النظام يتحقق أنك شخص حقيقي وليس صورة مطبوعة.</p>
    <div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:14px 16px;margin-bottom:20px">
      <p style="font-size:12.5px;font-weight:700;color:#0369a1;margin-bottom:10px">تعليمات:</p>
      ${['انظر مباشرة إلى الكاميرا','ابتسم أو حرّك رأسك ببطء عند الطلب','لا نظارات شمسية أو غطاء رأس','إضاءة جيدة من الأمام'].map((t,i)=>`<div style="font-size:12.5px;color:#0c4a6e;padding:4px 0;border-bottom:${i<3?'1px solid #e0f2fe':'none'}">✓ ${t}</div>`).join('')}
    </div>
    <div style="background:#111827;border-radius:14px;overflow:hidden;margin-bottom:20px">
      <div style="aspect-ratio:3/4;max-width:280px;margin:0 auto;display:flex;align-items:center;justify-content:center;position:relative">
        <div style="width:72%;height:80%;border:3px solid rgba(0,214,111,.7);border-radius:50%;display:flex;align-items:center;justify-content:center">
          <span style="color:rgba(255,255,255,.4);font-size:12px;text-align:center;padding:0 16px">ضع وجهك داخل البيضاوي</span>
        </div>
        <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border-radius:100px;padding:5px 14px;display:flex;align-items:center;gap:6px">
          <div style="width:7px;height:7px;border-radius:50%;background:#00d66f;animation:pulse 2s infinite"></div>
          <span style="color:white;font-size:11px;font-weight:600">Liveness Detection نشط</span>
        </div>
      </div>
    </div>
    ${pb('تم — إنهاء التوثيق',"S.verifyStep='done';draw()")}
    ${gb('رجوع',"S.verifyStep='scanDoc';draw()")}
  `));

  // DONE
  return wrap(`
  <div style="background:white;border-radius:16px;padding:48px 28px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e5e7eb;text-align:center">
    <div style="width:88px;height:88px;border-radius:50%;background:#f0fdf4;border:3px solid #86efac;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:48px">✓</div>
    <h2 style="font-size:24px;font-weight:900;margin-bottom:8px">تم التحقق من هويتك! 🎉</h2>
    <p style="font-size:14.5px;color:#6b7280;line-height:1.8;margin-bottom:28px">اجتازت هويتك فحوصات KYC بنجاح. حسابك الآن نشط ومُوثَّق بالكامل.</p>
    <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:16px 20px;margin-bottom:28px;text-align:right">
      ${[['✅','شارة التوثيق الزرقاء مفعّلة'],['📝','يمكنك تعديل بياناتك الآن'],['🔍','ملفك يظهر في نتائج البحث الموثقة'],['📊','تقارير الأداء متاحة']].map(f=>`<div style="display:flex;gap:8px;align-items:center;font-size:13.5px;color:#166534;padding:5px 0">${f[0]} ${f[1]}</div>`).join('')}
    </div>
    <button onclick="go('home')" style="width:100%;background:#0570de;color:white;border:none;border-radius:10px;padding:15px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">انتقل إلى ملفك الموثق</button>
  </div>`);
}

// ══════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════
const SCREENS = {
  home:       sHome,
  search:     sSearch,
  profile:    sProfile,
  categories: sCategories,
  lists:      sLists,
  company:    sCompany,
  mawshoor:   sMawshoor,
  nominate:   sNominate,
  add:        sAdd,
  membership: sMembership,
  checkout:   sCheckout,
  verify:     sVerify,
};

function draw(){
  document.getElementById('app').innerHTML = (SCREENS[S.screen]||sHome)();
}

// ══════════════════════════════════════════
// DROPDOWN LOGIC
// ══════════════════════════════════════════
function toggleDD(id){
  const menu = document.getElementById(id+'-menu');
  if(!menu) return;
  const isOpen = menu.classList.contains('open');
  closeDD();
  if(!isOpen) menu.classList.add('open');
}
function closeDD(){
  document.querySelectorAll('.dd-menu.open').forEach(m=>m.classList.remove('open'));
}
document.addEventListener('mousedown', e=>{
  if(!e.target.closest('.dropdown')) closeDD();
});

// ══════════════════════════════════════════
// CHECKOUT HELPERS
// ══════════════════════════════════════════
function checkPayBtnState(){
  const t = document.getElementById('chk-terms');
  const btn = document.getElementById('pay-btn');
  if(!t || !btn) return;
  const ok = t.checked;
  btn.disabled = !ok;
  btn.style.background = ok ? '#0570de' : '#cbd5e1';
  btn.style.cursor = ok ? 'pointer' : 'not-allowed';
}
function submitPayment(){
  S.checkoutSca = true;
  draw();
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
draw();
</script>
