<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أهلاً بك في مجرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }
        .bg-majra-yellow {
            background-color: #fef01b;
        }
        .text-majra-purple {
            color: #5a00a1;
        }
        .border-majra-purple {
            border-color: #5a00a1;
        }
        .btn-outline-purple {
            border: 2px solid #5a00a1;
            color: #5a00a1;
            transition: all 0.3s ease;
        }
        .btn-outline-purple:hover {
            background-color: #5a00a1;
            color: white;
        }
        /* تحسين استجابة الصورة */
        .success-image {
            max-width: 100%;
            height: auto;
            max-height: 350px;
            object-fit: contain;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header / Navbar -->
    <header class="border-b border-gray-100 py-4 px-6 md:px-12 flex justify-between items-center bg-white sticky top-0 z-50">
        <div class="flex items-center space-x-reverse space-x-6">
            <!-- Logo Simulation -->
            <div class="text-2xl font-bold text-majra-purple">مجرة</div>
            <nav class="hidden md:flex space-x-reverse space-x-8 text-sm font-medium text-gray-600">
                <a href="#" class="hover:text-majra-purple transition">الرئيسية</a>
                <a href="#" class="hover:text-majra-purple transition">باقات الاشتراك</a>
                <a href="#" class="hover:text-majra-purple transition">حمل تطبيق مجرة</a>
            </nav>
        </div>
        <div class="flex items-center space-x-reverse space-x-4">
            <a href="#" class="bg-majra-yellow px-6 py-2 rounded-full font-bold text-sm hover:opacity-90 transition shadow-sm">اشترك الآن</a>
            <div class="hidden sm:flex items-center text-xs text-gray-500 border-r pr-4 mr-2">
                <span>الرصيد المتبقي 01</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 py-12 text-center">
        
        <!-- Success Image Section -->
        <div class="w-full max-w-lg mb-10">
            <img 
                src="/_nuxt/img/success-subscribe.e33ed3b.webp" 
                alt="نجاح الاشتراك" 
                class="success-image mx-auto"
                onerror="this.src='https://my.majarra.com/_nuxt/img/success-subscribe.e33ed3b.webp'"
            >
        </div>

        <!-- Success Message -->
        <div class="max-w-3xl space-y-6">
            <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold text-gray-900 leading-tight">
                أهلاً بك في مجرة! رحلتك المعرفية تبدأ الآن.
            </h1>
            <p class="text-lg md:text-xl text-gray-600 font-light leading-relaxed">
                يمكنك الآن الاستمتاع بأفضل محتوى عربي على الأنترنت في أي وقت و مكان.
            </p>

            <!-- CTA Button -->
            <div class="pt-6">
                <button class="btn-outline-purple px-16 py-3.5 rounded-xl font-bold text-lg min-w-[240px] shadow-sm">
                    ابدأ الآن 
                </button>
            </div>
        </div>

    </main>

    <!-- Bottom Promo Banner -->
    <footer class="bg-majra-yellow py-4 px-6">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-center gap-2 text-center md:text-right">
            <p class="text-sm md:text-base font-medium text-gray-900">
                وفّر 50% من خلال <span class="font-bold border-b border-black">الاشتراك السنوي في مجرة</span>
                <span class="font-normal">واحصل على تصفح لا محدود لأفضل محتوى عربي على الإنترنت.</span>
            </p>
        </div>
    </footer>

</body>
</html>
