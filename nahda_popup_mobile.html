<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة تطبيق مجرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* هيكل الموبايل الخارجي */
        .mobile-frame {
            width: 375px;
            height: 760px;
            background: #1a1a1a;
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 4px solid #333;
        }

        /* الشاشة الداخلية */
        .mobile-screen {
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* النوتش العلوي */
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #1a1a1a;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 100;
        }

        /* محتوى الصفحة الرئيسية بالخلفية */
        .app-content {
            padding: 40px 20px;
            filter: blur(4px);
            opacity: 0.4;
        }

        /* حاوية التمركز للبوب أب */
        .popup-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            z-index: 50;
        }

        /* نافذة البوب أب في المنتصف */
        .popup-container {
            width: 92%;
            background: white;
            border-radius: 32px;
            padding: 30px 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(1);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-majara {
            background-color: #009688;
            transition: all 0.3s ease;
        }

        .btn-majara:active {
            transform: scale(0.96);
            background-color: #00796b;
        }

        .logo-img {
            width: 120px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <!-- إطار الموبايل -->
    <div class="mobile-frame">
        <div class="notch"></div>
        
        <div class="mobile-screen">
            
            <!-- محاكاة محتوى التطبيق الخلفي -->
            <div class="app-content space-y-6">
                <div class="flex justify-between items-center">
                    <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
                    <div class="w-24 h-4 bg-gray-200 rounded"></div>
                    <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
                </div>
                <div class="h-40 bg-gray-100 rounded-2xl w-full"></div>
                <div class="space-y-3">
                    <div class="h-4 bg-gray-100 rounded w-3/4"></div>
                    <div class="h-4 bg-gray-100 rounded w-full"></div>
                    <div class="h-4 bg-gray-100 rounded w-5/6"></div>
                </div>
            </div>

            <!-- طبقة التغطية والبوب أب المركزي -->
            <div class="popup-overlay">
                <div class="popup-container text-center">
                    
                    <!-- اللوغو الرسمي -->
                    <img src="https://my.majarra.com/_nuxt/img/majarra-logo.9855042.svg" alt="Majarra Logo" class="logo-img mb-6">

                    <h2 class="text-xl font-extrabold text-gray-800 mb-3">هدية خاصة لطلابنا</h2>

                    <p class="text-gray-600 text-sm leading-relaxed mb-6 px-2">
                        إيماناً منا بأن العلم يبدأ بشغفكم، يسعدنا دعم مسيرتكم الأكاديمية بمنحكم اشتراكاً مجانياً كاملاً في برنامج <b>"شركاء النهضة"</b>. استعدوا للوصول إلى أفضل المحتويات العربية لدعم دراستكم وتوسيع آفاقكم.
                    </p>

                    <!-- المميزات (تعديل المحاذاة للمنتصف) -->
                    <div class="space-y-3 mb-8 text-[13px] text-gray-700 flex flex-col items-center">
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-emerald-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                            <span>تصفح لا محدود لكامل منصات مجرة</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-emerald-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                            <span>محتوى مختار وخالٍ من التشتت</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <svg class="w-4 h-4 text-emerald-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                            <span>تجربة قراءة أسرع</span>
                        </div>
                    </div>

                    <!-- زر الإجراء -->
                    <button class="w-full py-4 text-white text-lg font-bold rounded-2xl btn-majara shadow-lg shadow-teal-100">
                        اشترك الآن
                    </button>

                    <button class="mt-4 text-xs text-gray-400 hover:text-gray-600">
                        ليس الآن، شكراً
                    </button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
